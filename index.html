<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE SEEKER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
font-family:Arial,sans-serif;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-1;
}

.content{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

h1{
font-size:90px;
letter-spacing:8px;
text-shadow:0 0 40px gold;
}

p{
margin-top:20px;
font-size:24px;
opacity:.9;
}

button{
margin-top:40px;
padding:18px 45px;
font-size:20px;
background:gold;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<video autoplay muted loop>

<source src="https://cdn.coverr.co/videos/coverr-mountains-covered-in-snow-1561957609554?download=1080p" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="content">

<h1>THE SEEKER</h1>

<p>The Journey Beyond Fear</p>

<button>COMING SOON</button>

</div>

</body>

</html>
